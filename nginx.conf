# nginx.conf — reverse proxy in front of Django (gunicorn on backend:8000)
# - Proxies all dynamic traffic to the backend
# - Serves /static/ directly from the collectstatic output volume

upstream django_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Serve collected static files directly (faster + offloads Django)
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Everything else goes to Django
    location / {
        proxy_pass http://django_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 60s;
    }
}
