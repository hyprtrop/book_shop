name: dev — artifact-first

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write   # needed to commit the artifact back to the dev branch

env:
  ARTIFACT_NAME: app-${{ github.sha }}.tar.gz
  IMAGE_TAG: dev-${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) Check out the dev branch with full history so we can push the artifact back
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2) Build the application artifact
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps + collect static (artifact prep)
        working-directory: book-shop
        env:
          # collectstatic needs *some* values just to import settings.py;
          # they are not used by collectstatic itself.
          SECRET_KEY: ci-build-key-not-used-at-runtime
          ALLOWED_HOSTS: "*"
          DEBUG: "False"
          POSTGRES_DB: ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_HOST: localhost
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements.txt
          python manage.py collectstatic --noinput

      - name: Package artifact (source + staticfiles + frozen deps)
        run: |
          set -euo pipefail
          mkdir -p artifacts build/app
          # Copy Django project source
          cp -R book-shop/. build/app/
          # Freeze deps INSIDE the artifact so the image build doesn't depend on the repo
          cp requirements.txt build/app/requirements.txt
          # Tarball it
          tar -czf "artifacts/${ARTIFACT_NAME}" -C build/app .
          echo "Built artifact:"
          ls -lh "artifacts/${ARTIFACT_NAME}"

      # 3) Commit the artifact back to dev (audit trail)
      - name: Commit artifact to dev branch
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: dev
          commit_message: "ci(dev): build artifact ${{ github.sha }}"
          file_pattern: "artifacts/*.tar.gz"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com

      # 4) Swap in the artifact-based Dockerfile and build the image FROM the artifact
      - name: Use artifact-based Dockerfile
        run: cp Dockerfile.artifact Dockerfile

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image from artifact
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:${IMAGE_TAG}"
          echo "Building $IMAGE from artifacts/${ARTIFACT_NAME}"
          docker build \
            --build-arg ARTIFACT_FILE="${ARTIFACT_NAME}" \
            -t "$IMAGE" \
            .
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      # dev pushes too so the same image can later be promoted (and so deploy can pull)
      - name: Push dev image
        run: docker push "$IMAGE"

      # 5) Deploy to EC2 (compose project: dev, host port: 8080)
      - name: Deploy to EC2 (dev)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE,POSTGRES_DB_DEV,POSTGRES_USER_DEV,POSTGRES_PASSWORD_DEV,SECRET_KEY_DEV
          script: |
            set -euo pipefail
            APP_DIR=~/bookshop/dev
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # Pull the compose file + nginx.conf for this branch
            curl -fsSL -o compose.deploy.yml \
              https://raw.githubusercontent.com/${{ github.repository }}/dev/compose.deploy.yml
            curl -fsSL -o nginx.conf \
              https://raw.githubusercontent.com/${{ github.repository }}/dev/nginx.conf

            cat > .env <<EOF
            SECRET_KEY=${{ secrets.SECRET_KEY_DEV }}
            DEBUG=False
            ALLOWED_HOSTS=${{ vars.EC2_HOST }},localhost,127.0.0.1
            POSTGRES_DB=${{ secrets.POSTGRES_DB_DEV }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER_DEV }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD_DEV }}
            POSTGRES_HOST=db
            POSTGRES_PORT=5432
            EOF

            export BACKEND_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:dev-${{ github.sha }}"
            export NGINX_PORT=8080

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin || true
            docker pull "$BACKEND_IMAGE"

            docker compose -p dev -f compose.deploy.yml down || true
            BACKEND_IMAGE="$BACKEND_IMAGE" NGINX_PORT="$NGINX_PORT" \
              docker compose -p dev -f compose.deploy.yml up -d
            docker compose -p dev -f compose.deploy.yml ps
