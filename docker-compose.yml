# docker-compose.yml — Phase 1: 3 services (db, backend, nginx) on a shared bridge network.
# Phase 2 (test/prod): the `backend.image:` line is what the CI/CD pipelines push and pull.
# For Phase 1 a local `build:` is included so `docker compose up --build` works from a fresh clone.

services:
  db:
    image: postgres:15
    container_name: bookshop_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bookshop_net

  backend:
    # Phase 1: build from source so `docker compose up --build` works on a clean clone.
    # Phase 2 (test/prod) overrides this with an image pulled from Docker Hub — see compose.prod.yml.
    build:
      context: .
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-bookshop-backend:local}
    container_name: bookshop_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - bookshop_net

  nginx:
    image: nginx:1.27-alpine
    container_name: bookshop_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - backend
    networks:
      - bookshop_net

volumes:
  postgres_data:
  static_volume:

networks:
  bookshop_net:
    driver: bridge
