# compose.deploy.yml — used on the EC2 server by all three pipelines (dev/test/prod).
# Unlike the root docker-compose.yml (which has `build:` so Phase 1 works from a fresh
# clone), this file references the image by tag. The pipelines set BACKEND_IMAGE
# before running `docker compose -f compose.deploy.yml up -d`.
#
# To keep the three branch deployments from colliding on a single EC2 host we use:
#   - distinct COMPOSE_PROJECT_NAME per branch (-p dev / -p test / -p prod)
#   - distinct NGINX_PORT per branch (dev=8080, test=8081, prod=80)
#   - distinct .env files per branch (.env.dev / .env.test / .env.prod)

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bookshop_net

  backend:
    image: ${BACKEND_IMAGE}          # <-- pipeline sets this (Docker Hub tag)
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - bookshop_net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - backend
    networks:
      - bookshop_net

volumes:
  postgres_data:
  static_volume:

networks:
  bookshop_net:
    driver: bridge
